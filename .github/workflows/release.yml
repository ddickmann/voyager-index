name: release

on:
  release:
    types: [published]

permissions: {}

jobs:
  build-python:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build tools
        run: python -m pip install --upgrade pip build
      - name: Build wheel and sdist
        run: python -m build
      - name: Verify artifacts
        run: |
          python -m pip install twine
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist-python
          path: dist/

  build-native-wheels:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - crate: knapsack_solver
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: "2_28"
          # macOS Intel (cross-compile on ARM runner, macos-13 is deprecated)
          - crate: knapsack_solver
            os: macos-14
            target: x86_64-apple-darwin
          # macOS Apple Silicon
          - crate: knapsack_solver
            os: macos-14
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    env:
      MACOSX_DEPLOYMENT_TARGET: "10.14"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: PyO3/maturin-action@v1
        with:
          working-directory: src/kernels/${{ matrix.crate }}
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux || 'auto' }}
          args: --release --strip --interpreter 3.10 3.11 3.12
          before-script-linux: yum install -y clang-devel
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.crate }}-${{ matrix.os }}-${{ matrix.target }}
          path: src/kernels/${{ matrix.crate }}/target/wheels/*.whl

  graph-release-gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package and graph validation extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install --index-url https://download.pytorch.org/whl/cpu torch
          python -m pip install -e ".[server,multimodal,dev,shard]"
      - name: Run graph release gate
        run: |
          pytest \
            tests/test_latence_graph_lightrag.py \
            tests/test_latence_graph_crud.py \
            tests/test_latence_graph_quality.py \
            -v --tb=short
          python tools/benchmarks/benchmark_latence_graph_quality.py --mode benchmark --output-json graph-benchmark.json
          python - <<'PY'
          import json
          payload = json.load(open("graph-benchmark.json", "r", encoding="utf-8"))
          representative = payload["representative"]
          assert representative["graph"]["route_checks"]["all_passed"], "graph route checks failed"
          assert payload["representative"]["comparison"]["graph_shaped"]["recall"] > 0.0, "graph-shaped uplift missing"
          assert payload["representative"]["graph"]["graph_applied_rate"] < 1.0, "ordinary queries should not all trigger graph"
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: graph-release-gate-report
          path: graph-benchmark.json

  publish:
    needs: [build-python, build-native-wheels, graph-release-gate]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: all-artifacts/
      - name: Collect all wheels into dist/
        run: |
          mkdir -p dist/
          find all-artifacts/ -name '*.whl' -exec cp {} dist/ \;
          find all-artifacts/ -name '*.tar.gz' -exec cp {} dist/ \;
          echo "=== Artifacts to publish ==="
          ls -lh dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
          verbose: true
