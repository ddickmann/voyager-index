name: Bug Report
description: Report a bug in colsearch
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill out the sections below so we can reproduce and fix the issue.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal code or steps to reproduce the behavior.
      placeholder: |
        1. pip install colsearch
        2. Run `python -c "..."`
        3. Observe error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened, including any error messages or tracebacks.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Please provide the following:
        - OS and version
        - Python version
        - colsearch version (`python -c "import colsearch; print(colsearch.__version__)"`)
        - PyTorch version (if relevant)
        - Whether optional packages are installed (`latence_shard_engine`, `latence_solver`, `latence`)
      placeholder: |
        OS: Ubuntu 22.04
        Python: 3.11.10
        colsearch: 0.1.7
        torch: 2.9.1 (CPU)
        Optional packages: latence_shard_engine, latence_solver
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or output
      description: Paste any relevant log output. This will be formatted as code automatically.
      render: shell
