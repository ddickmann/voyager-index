apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: colsearch
  namespace: colsearch
spec:
  serviceName: "colsearch-headless"
  replicas: 3
  selector:
    matchLabels:
      app: colsearch
  template:
    metadata:
      labels:
        app: colsearch
    spec:
      containers:
      - name: colsearch-node
        image: latence/colsearch:latest
        ports:
        - containerPort: 8000
          name: api
        - containerPort: 50051
          name: grpc
        env:
        - name: NODE_ID
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: SHARD_COUNT
          value: "12"
        volumeMounts:
        - name: data
          mountPath: /data
        resources:
          limits:
            nvidia.com/gpu: 1
            memory: "64Gi"
          requests:
            nvidia.com/gpu: 1
            memory: "32Gi"
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 1Ti
---
apiVersion: v1
kind: Service
metadata:
  name: colsearch-api
  namespace: colsearch
spec:
  selector:
    app: colsearch
  ports:
  - port: 80
    targetPort: 8000
  type: LoadBalancer
