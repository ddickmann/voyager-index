version: "3.8"

services:
  colsearch:
    build:
      context: ../..
      dockerfile: deploy/reference-api/Dockerfile
    image: colsearch:latest
    container_name: colsearch
    ports:
      - "8080:8080"
    environment:
      COLSEARCH_INDEX_PATH: /data/colsearch
      HOST: 0.0.0.0
      PORT: 8080
      WORKERS: 4
    volumes:
      - colsearch-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${PORT:-8080}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  colsearch-data:
